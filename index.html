<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia / 출결관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f172a; --card:#1e293fb; --card2:#273449; --bd:#334155;
  --tx:#e2e8f0; --mt:#94a3b8; --mut:#64748b;
  --pri:#3b82f6; --pri2:#2563eb; --ok:#10b981; --warn:#f59e0b; --err:#ef4444; --pur:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 14px 60px}
/* topbar */
.top{position:sticky;top:0;z-index:40;background:rgba(15,23,42,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd)}
.top .in{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:10px 14px}
.brand{font-weight:800;font-size:16px;letter-spacing:.3px;white-space:nowrap}
.brand span{color:var(--pri)}
.nav{display:flex;gap:4px;flex:1;flex-wrap:wrap;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{padding:7px 10px;border-radius:8px;color:var(--mt);font-weight:600;font-size:13px;white-space:nowrap}
.nav a.on{background:var(--pri);color:#fff}
.nav a:hover:not(.on){background:var(--card)}
.shiftbadge{font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;white-space:nowrap}
.sb-d{background:#78350f33;color:#fbbf24;border:1px solid #78350f}
.sb-n{background:#1e3a8a33;color:#93c5fd;border:1px solid #1e3a8a}
/* cards & layout */
.ptitle{font-size:20px;font-weight:800;margin:18px 0 14px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:820px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px}
.card.p0{padding:0;overflow:hidden}
.mb12{margin-bottom:12px}.mb8{margin-bottom:8px}.mt12{margin-top:12px}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.mla{margin-left:auto}
.muted{color:var(--mt)}.mono{font-family:ui-monospace,Menlo,monospace}
/* stat cards */
.stat{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 16px}
.stat .k{font-size:12px;color:var(--mt);font-weight:600}
.stat .v{font-size:26px;font-weight:800;margin-top:2px}
.bar{height:8px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;border-radius:6px}
/* buttons */
.btn{border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;background:var(--card2);transition:.12s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translateY(1px)}
.bp{background:var(--pri)} .bok{background:var(--ok)} .bw{background:var(--warn);color:#1a1205} .bd{background:var(--err)} .bpur{background:var(--pur)}
.bg{background:var(--card2);color:var(--tx);border:1px solid var(--bd)}
.bsm{padding:6px 10px;font-size:12px}
.blg{padding:14px 20px;font-size:16px}
/* forms */
.fg{margin-bottom:10px}.fl{display:block;font-size:12px;color:var(--mt);font-weight:600;margin-bottom:4px}
.fi{width:100%;background:var(--card2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit}
.fi:focus{outline:none;border-color:var(--pri)}
select.fi{cursor:pointer}
/* table */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
th{background:var(--card2);text-align:left;padding:9px 11px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mt);font-weight:700;position:sticky;top:0}
td{padding:9px 11px;border-top:1px solid var(--bd)}
tbody tr:hover{background:#ffffff08}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pl-ok{background:#064e3b;color:#6ee7b7} .pl-tard{background:#78350f;color:#fcd34d}
.pl-aus{background:#7f1d1d;color:#fca5a5} .pl-none{background:var(--card2);color:var(--mt)}
.chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
/* toast */
#toasts{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--card);border:1px solid var(--bd);border-left:4px solid var(--pri);padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 24px #0008;animation:tin .2s;max-width:90vw}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--err)} .toast.warn{border-left-color:var(--warn)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
/* modal */
.mod{position:fixed;inset:0;background:#0009;z-index:80;display:none;align-items:flex-start;justify-content:center;padding:40px 14px;overflow:auto}
.mod.open{display:flex}
.modin{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;width:100%;max-width:560px}
.modtitle{font-size:16px;font-weight:800;margin-bottom:14px}
/* misc */
.center{text-align:center}
.empty{text-align:center;color:var(--mut);padding:40px 10px}
.scan-in{font-size:32px;text-align:center;letter-spacing:4px;font-weight:800;padding:18px}
.big-clock{font-size:15px;font-weight:700;color:var(--mt)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.hidden{display:none!important}
.linkbtn{background:none;border:none;color:var(--pri);cursor:pointer;font-weight:700;font-size:13px;padding:0}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--pri)}
</style>
</head>
<body>
<div class="top"><div class="in">
  <div class="brand">◆ <span>Asistencia / 출결</span></div>
  <nav class="nav" id="nav"></nav>
  <div id="shiftBadge" class="shiftbadge sb-d"></div>
</div></div>
<div class="wrap" id="view"></div>
<div id="toasts"></div>
<div class="mod" id="modal"><div class="modin" id="modalIn"></div></div>

<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG — Supabase 프로젝트 정보 입력
   (Supabase 대시보드 → Project Settings → API)
   ══════════════════════════════════════════════════════════════ */
const CONFIG = {
  SUPABASE_URL: "https://rblvroleeozttebiyfot.supabase.co",        // 예: https://xxxx.supabase.co  (※ /rest/v1 이나 끝 슬래시는 넣지 마세요)
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibHZyb2xlZW96dHRlYml5Zm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjA1MjUsImV4cCI6MjA5ODQ5NjUyNX0.VIbEXzurTBNMtlNfNtqBCOJ9MmuTGE1TY9cSLpzYmsc"
};

/* ── 상수 ────────────────────────────────────────────────────── */
const EMP_TYPES = ["Turno A","Turno B","Turno C","Fijo Semana","Fijo Fin de Semana","Fijo Diurno"];
const SHIFTS    = ["Día","Noche"];
const STATUSES  = ["Activo","Licencia","Retirado"];
const WORK_TYPES= ["Normal","H.Extra","Recuperación"];
const ABS_TYPES = ["Vacaciones","Enfermedad","Falta injustificada"];

/* ── 한글/스페인어 병기 (표시 전용, 저장값은 스페인어 유지) ───── */
const KO = {
  // turnos / shifts
  "Día":"주간","Noche":"야간","Descanso":"휴무",
  // emp types
  "Turno A":"A조","Turno B":"B조","Turno C":"C조",
  "Fijo Semana":"평일고정","Fijo Fin de Semana":"주말고정","Fijo Diurno":"주간고정",
  // status
  "Activo":"재직","Licencia":"휴직","Retirado":"퇴사",
  // work types
  "Normal":"일반","H.Extra":"연장","Recuperación":"회복",
  // attendance status
  "Presente":"출근","Tardanza":"지각","Ausente":"결근",
  // absence types
  "Vacaciones":"휴가","Enfermedad":"병가","Falta injustificada":"무단결근"
};
const bi = v => (KO[v] ? `${v} / ${KO[v]}` : v);

/* ══════════════════════════════════════════════════════════════
   Supabase REST 헬퍼  (자주검사 앱과 동일 패턴)
   ══════════════════════════════════════════════════════════════ */
const CONFIGURED = CONFIG.SUPABASE_URL.startsWith("http");
// 끝 슬래시나 실수로 들어간 /rest/v1 을 자동 정리 → 항상 올바른 베이스 URL 사용
const SUPA_BASE = CONFIG.SUPABASE_URL.replace(/\/+$/,"").replace(/\/rest\/v1$/,"");
async function api(path, {method="GET", body, prefer}={}){
  if(!CONFIGURED) throw new Error("NO_CONFIG");
  const res = await fetch(`${SUPA_BASE}/rest/v1/${path}`, {
    method,
    headers:{
      apikey: CONFIG.SUPABASE_ANON_KEY,
      Authorization: `Bearer ${CONFIG.SUPABASE_ANON_KEY}`,
      "Content-Type":"application/json",
      ...(prefer?{Prefer:prefer}:{})
    },
    body: body!==undefined ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ throw new Error(`${res.status} ${await res.text()}`); }
  if(res.status===204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}
const sel    = (t,q="")   => api(`${t}?${q}`);
const insert = (t,rows,up=false)=> api(t,{method:"POST",body:Array.isArray(rows)?rows:[rows],
                 prefer: up?"resolution=merge-duplicates,return=representation":"return=representation"});
const patch  = (t,q,body) => api(`${t}?${q}`,{method:"PATCH",body,prefer:"return=representation"});
const del    = (t,q)      => api(`${t}?${q}`,{method:"DELETE"});

/* ══════════════════════════════════════════════════════════════
   상태 & 캐시
   ══════════════════════════════════════════════════════════════ */
const S = { settings:{}, processes:[], ranks:[], employees:[] };
const today = () => new Date().toLocaleDateString("en-CA");            // YYYY-MM-DD (로컬)
const nowHM = () => new Date().toTimeString().slice(0,5);              // HH:MM
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc= s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(msg,type=""){
  const d=document.createElement("div"); d.className="toast "+type; d.textContent=msg;
  $("#toasts").appendChild(d); setTimeout(()=>{d.style.opacity=0;setTimeout(()=>d.remove(),300)},2600);
}
function openModal(html){ $("#modalIn").innerHTML=html; $("#modal").classList.add("open"); }
function closeModal(){ $("#modal").classList.remove("open"); }
$("#modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

/* ══════════════════════════════════════════════════════════════
   비즈니스 로직 (app.py 이식)
   ══════════════════════════════════════════════════════════════ */
function currentShift(){
  const h=new Date().getHours();
  const ds=+(S.settings.day_start??6), ns=+(S.settings.night_start??18);
  return (ds<=h && h<ns) ? "Día" : "Noche";
}
async function teamShift(team,dstr){
  const r=await sel("team_schedule",`team=eq.${team}&sch_date=eq.${dstr}&select=shift`);
  return r&&r[0]?r[0].shift:null;
}
async function isWorkDay(emp,dstr){
  const wd=new Date(dstr+"T00:00:00").getDay();   // 0=일..6=토
  const et=emp.emp_type;
  if(["Turno A","Turno B","Turno C"].includes(et)){
    const s=await teamShift(et.slice(-1),dstr); return !!(s && s!=="Descanso");
  }
  // JS: 0=Dom,1=Lun..6=Sab  |  app.py weekday: 0=Lun..6=Dom
  const py=(wd+6)%7;
  if(et==="Fijo Semana")        return [0,1,2,3].includes(py);
  if(et==="Fijo Fin de Semana") return [4,5,0,1].includes(py);
  if(et==="Fijo Diurno")        return [0,1,2,3,4].includes(py);
  return true;
}
async function stdTime(emp,dstr){
  const et=emp.emp_type;
  if(["Turno A","Turno B","Turno C"].includes(et)){
    const s=await teamShift(et.slice(-1),dstr);
    if(s) return s==="Noche"?"20:00":"06:00";
  }
  return emp.shift==="Noche"?"20:00":"06:00";
}
/* 스캔 시각으로 주/야 편성: 06:00~08:59=주간, 18:00~20:59=야간, 그 외=미분류("") */
function scanShift(hm){ const h=+hm.slice(0,2); if(h>=6&&h<9) return "Día"; if(h>=18&&h<21) return "Noche"; return ""; }
async function doScan(empId, workType="Normal", workProcess=""){
  const code=String(empId||"").trim().toUpperCase();
  if(!code) return {ok:false,msg:"Código vacío / 코드 없음"};
  const emp=S.employees.find(e=>e.emp_id===code);
  // 등록되어 있으나 비활성(휴직/퇴사)인 경우만 거부. 미등록 코드는 허용.
  if(emp && emp.status!=="Activo")
    return {ok:false,msg:`Empleado inactivo / 비활성 직원 — ${emp.name} (${bi(emp.status)})`};
  const d=today(), t=nowHM();
  const existing=await sel("attendance",`emp_id=eq.${code}&att_date=eq.${d}&select=check_in`);
  if(existing&&existing.length)
    return {ok:false,msg:`Ya registrado / 이미 기록됨 — ${emp?emp.name:code} (${existing[0].check_in})`};
  const shift=scanShift(t), wp=workProcess||(emp?emp.process:"");
  await insert("attendance",{emp_id:code,att_date:d,check_in:t,att_status:"Presente",
    work_type:workType,work_process:wp,shift_type:shift,abs_type:""});
  const shIco=shift==="Día"?"☀":shift==="Noche"?"🌙":"·";
  const shTxt=shift?bi(shift):"Sin turno / 미분류";
  const tag=workType!=="Normal"?` [${bi(workType)}]`:"";
  const who=emp?`${emp.name} (${emp.process})`:`${code} · Sin registrar / 미등록`;
  return {ok:true,msg:`✓ ${who} ${t} ${shIco}${shTxt}${tag}`,unreg:!emp};
}

/* ── 마스터 로딩 ─────────────────────────────────────────────── */
async function loadMasters(){
  const [st,pr,rk,em]=await Promise.all([
    sel("settings","select=key,value"),
    sel("processes","select=*&order=name"),
    sel("ranks","select=name&order=name"),
    sel("employees","select=*&order=process,name")
  ]);
  S.settings={}; (st||[]).forEach(r=>S.settings[r.key]=r.value);
  S.processes=pr||[]; S.ranks=(rk||[]).map(r=>r.name); S.employees=em||[];
}
const activeEmps = () => S.employees.filter(e=>e.status==="Activo");
/* 오늘 배정 주/야 (교대조=근무표, 고정근무=등록 주/야). 휴무·비근무일이면 null.
   teamMap: {A:"Día"|"Noche"|"Descanso", ...}, wd: 요일(0=일..6=토) */
function assignedShiftSync(emp, wd, teamMap){
  const et=emp.emp_type;
  if(["Turno A","Turno B","Turno C"].includes(et)){
    const s=teamMap[et.slice(-1)];
    return (s==="Día"||s==="Noche")?s:null;   // Descanso/미지정 → 미근무
  }
  const py=(wd+6)%7;                           // 0=월..6=일
  let work=true;
  if(et==="Fijo Semana")             work=[0,1,2,3].includes(py);
  else if(et==="Fijo Fin de Semana") work=[4,5,0,1].includes(py);
  else if(et==="Fijo Diurno")        work=[0,1,2,3,4].includes(py);
  if(!work) return null;
  return emp.shift==="Noche"?"Noche":"Día";
}
async function todayRecords(){
  const d=today();
  const recs=await sel("attendance",`att_date=eq.${d}&select=*`);
  const map={}; (recs||[]).forEach(r=>map[r.emp_id]=r);
  return activeEmps().map(e=>({...e, a:map[e.emp_id]||null}));
}

/* ══════════════════════════════════════════════════════════════
   라우터 & 네비게이션
   ══════════════════════════════════════════════════════════════ */
const ROUTES=[
  {id:"",     label:"📊 Panel / 현황판",     fn:renderDashboard},
  {id:"scan", label:"✅ Marcar / 출근체크",    fn:renderScan},
  {id:"hoy",  label:"📋 Hoy / 오늘",       fn:renderHoy},
  {id:"hist", label:"📅 Historial / 이력", fn:renderHist},
  {id:"turnos",label:"🔄 Turnos / 근무표",   fn:renderTurnos},
  {id:"nuevos",label:"🆕 Sin registrar / 미등록", fn:renderNuevos},
  {id:"admin",label:"⚙ Admin / 관리",      fn:renderAdmin},
];
function buildNav(cur){
  $("#nav").innerHTML=ROUTES.map(r=>
    `<a href="#/${r.id}" class="${r.id===cur?'on':''}">${r.label}</a>`).join("");
  const sh=currentShift();
  const b=$("#shiftBadge"); b.className="shiftbadge "+(sh==="Día"?"sb-d":"sb-n");
  b.textContent=(sh==="Día"?"☀ ":"🌙 ")+bi(sh);
}
async function router(){
  const hash=location.hash.replace(/^#\//,""); const [id]=hash.split("/");
  const route=ROUTES.find(r=>r.id===id)||ROUTES[0];
  buildNav(route.id);
  $("#view").innerHTML=`<div class="empty">Cargando… / 불러오는 중…</div>`;
  try{ await route.fn(); }
  catch(e){ $("#view").innerHTML=`<div class="empty">⚠ ${esc(e.message)}</div>`; }
}
window.addEventListener("hashchange",router);

/* ══════════════════════════════════════════════════════════════
   화면 1 — Panel (대시보드)
   ══════════════════════════════════════════════════════════════ */
async function renderDashboard(){
  const d=today();
  const wd=new Date(d+"T00:00:00").getDay();
  const [att,teamRows]=await Promise.all([
    sel("attendance",`att_date=eq.${d}&select=*`),
    sel("team_schedule",`sch_date=eq.${d}&select=team,shift`)
  ]);
  const teamMap={}; (teamRows||[]).forEach(r=>teamMap[r.team]=r.shift);
  const empById={}; S.employees.forEach(e=>empById[e.emp_id]=e);
  const isPresent=a=>a&&["Presente","Tardanza"].includes(a.att_status);
  const present=(att||[]).filter(isPresent);

  // 출근(스캔 시각 기준 주/야) 집계 — 등록·미등록 모두 포함
  let presDay=0, presNight=0;
  present.forEach(a=>{ if(a.shift_type==="Día")presDay++; else if(a.shift_type==="Noche")presNight++; });
  const presTotal=present.length;

  // 배정(오늘 근무해야 할 인원) — 등록 활성 직원만, 근무표/고정근무 기준
  let asgDay=0, asgNight=0;
  const asgByProc={};
  activeEmps().forEach(e=>{
    const s=assignedShiftSync(e,wd,teamMap); if(!s)return;
    if(s==="Día")asgDay++; else asgNight++;
    const b=asgByProc[e.process]=asgByProc[e.process]||{d:0,n:0};
    if(s==="Día")b.d++; else b.n++;
  });
  const asgTotal=asgDay+asgNight;

  // 공정별 출근(주/야) — 미등록·미분류(공정 없음)는 제외
  const presByProc={};
  present.forEach(a=>{
    const emp=empById[a.emp_id];
    const proc=a.work_process||(emp?emp.process:"");
    if(!proc)return;
    const b=presByProc[proc]=presByProc[proc]||{d:0,n:0,extra:0,recup:0};
    if(a.shift_type==="Día")b.d++; else if(a.shift_type==="Noche")b.n++;
    if(a.work_type==="H.Extra")b.extra++; if(a.work_type==="Recuperación")b.recup++;
  });
  const procStats=S.processes.map(p=>{
    const pr=presByProc[p.name]||{d:0,n:0,extra:0,recup:0};
    const ag=asgByProc[p.name]||{d:0,n:0};
    return {...p, presDay:pr.d, presNight:pr.n, extra:pr.extra, recup:pr.recup, asgDay:ag.d, asgNight:ag.n};
  });

  // 직급별 (등록 직원만)
  const byRank={};
  activeEmps().forEach(e=>{ (byRank[e.rank]=byRank[e.rank]||{total:0,day:0,night:0}).total++; });
  present.forEach(a=>{ const e=empById[a.emp_id]; if(!e)return; const b=byRank[e.rank]; if(!b)return;
    if(a.shift_type==="Día")b.day++; else if(a.shift_type==="Noche")b.night++; });

  const unreg=present.filter(a=>!empById[a.emp_id]).length;
  const cellCol=(pv,av)=>pv>=av&&av>0?"var(--ok)":pv>=av*.7?"var(--warn)":av===0?"var(--mt)":"var(--err)";

  $("#view").innerHTML=`
  <div class="ptitle">📊 Panel del día / 오늘 현황 <span class="muted" style="font-size:13px;font-weight:600">${d}</span></div>
  <div class="grid g4 mb12">

    ${dnCard("☀ Día / 주간",presDay,asgDay,"var(--warn)")}
    ${dnCard("🌙 Noche / 야간",presNight,asgNight,"var(--pur)")}
    ${dnCard("Activos / 재직",activeEmps().length,null,"var(--pri)")}
  </div>
  <div class="ptitle" style="font-size:16px">☀ Día / 주간 — por proceso / 공정별 <span class="muted" style="font-size:12px;font-weight:600">출근 / 배정</span></div>
  <div class="grid g3 mb12">
    ${procStats.map(p=>`<div class="card">
      <div class="flex"><span class="dot" style="background:${p.color}"></span><b>${esc(p.name)}</b>
        <span class="mla mono" style="font-size:22px;font-weight:800;color:${cellCol(p.presDay,p.asgDay)}">${p.presDay}<span style="font-size:14px;color:var(--mt)">/${p.asgDay}</span></span></div>
      </div>`).join("")||`<div class="empty">Sin procesos / 공정 없음</div>`}
  </div>
  <div class="ptitle" style="font-size:16px">🌙 Noche / 야간 — por proceso / 공정별 <span class="muted" style="font-size:12px;font-weight:600">출근 / 배정</span></div>
  <div class="grid g3 mb12">
    ${procStats.map(p=>`<div class="card">
      <div class="flex"><span class="dot" style="background:${p.color}"></span><b>${esc(p.name)}</b>
        <span class="mla mono" style="font-size:22px;font-weight:800;color:${cellCol(p.presNight,p.asgNight)}">${p.presNight}<span style="font-size:14px;color:var(--mt)">/${p.asgNight}</span></span></div>
      </div>`).join("")||`<div class="empty">Sin procesos / 공정 없음</div>`}
  </div>
  ${unreg?`<div class="card mb12" style="border-left:4px solid var(--pur)">
    🆕 Sin registrar / 미등록 출근 <b>${unreg}</b>명 ·
    <a href="#/nuevos" class="linkbtn">목록 보기 / Ver lista →</a></div>`:""}
  <div class="ptitle" style="font-size:16px">🏷 Por cargo / 직급별</div>
  <div class="tw card p0"><table>
    <thead><tr><th>Cargo / 직급</th><th>Total / 합계</th><th>☀ Día / 주간</th><th>🌙 Noche / 야간</th><th>Presente / 출근</th></tr></thead>
    <tbody>${Object.entries(byRank).map(([r,b])=>`<tr>
      <td style="font-weight:600">${esc(r)}</td><td class="mono">${b.total}</td>
      <td class="mono">${b.day}</td><td class="mono">${b.night}</td>
      <td><span class="pill ${b.day+b.night>=b.total?'pl-ok':'pl-tard'}">${b.day+b.night}/${b.total}</span></td>
    </tr>`).join("")||`<tr><td colspan="5" class="empty">Sin datos / 데이터 없음</td></tr>`}</tbody>
  </table></div>`;
}
function dnCard(k,present,assigned,col){
  const has=assigned!=null;
  const pct=has?(assigned?Math.min(100,Math.round(present/assigned*100)):0):100;
  return `<div class="stat"><div class="k">${k}</div>
    <div class="v" style="color:${col}">${present}${has?`<span style="font-size:15px;color:var(--mt);font-weight:600"> / ${assigned}</span>`:""}</div>
    <div class="bar"><i style="width:${pct}%;background:${col}"></i></div></div>`;
}

   화면 2 — Marcar (출퇴근 스캔)
   ══════════════════════════════════════════════════════════════ */
async function scanTodayList(){
  const d=today();
  const empById={}; S.employees.forEach(e=>empById[e.emp_id]=e);
  const att=await sel("attendance",`att_date=eq.${d}&select=*`);
  return (att||[]).filter(a=>a.check_in).map(a=>{
    const e=empById[a.emp_id];
    return {check_in:a.check_in, name:e?e.name:a.emp_id, unreg:!e,
      process:a.work_process||(e?e.process:""), att_status:a.att_status,
      work_type:a.work_type, shift_type:a.shift_type};
  }).sort((x,y)=>(y.check_in||"").localeCompare(x.check_in||""));
}
async function renderScan(){
  const done=await scanTodayList();
  $("#view").innerHTML=`
  <div class="ptitle">✅ Marcar asistencia / 출근 체크</div>
  <div class="grid g2">
    <div class="card">
      <div class="fg"><label class="fl">Código de empleado / 사원 코드</label>
        <input id="scanCode" class="fi scan-in" placeholder="EMP___" autocomplete="off" autofocus></div>
      <div class="grid g2">
        <div class="fg"><label class="fl">Tipo de trabajo / 근무 유형</label>
          <select id="scanWT" class="fi">${WORK_TYPES.map(w=>`<option value="${w}">${bi(w)}</option>`).join("")}</select></div>
        <div class="fg"><label class="fl">Proceso (opcional) / 공정(선택)</label>
          <select id="scanProc" class="fi"><option value="">— Predeterminado / 기본값 —</option>
            ${S.processes.map(p=>`<option>${esc(p.name)}</option>`).join("")}</select></div>
      </div>
      <button class="btn bok blg" style="width:100%" id="scanBtn">✅ Registrar entrada / 출근 등록</button>
      <div class="muted center" style="margin-top:8px;font-size:12px">Marcados hoy / 오늘 체크: <b>${done.length}</b> · Activos / 재직 ${activeEmps().length}</div>
      <div class="muted center" style="margin-top:4px;font-size:11px">☀ 주간 06:00–08:59 · 🌙 야간 18:00–20:59 · 그 외 미분류</div>
    </div>
    <div class="card p0">
      <div style="padding:12px 14px;font-weight:700;border-bottom:1px solid var(--bd)">🕒 Últimos registros / 최근 기록</div>
      <div class="tw"><table><thead><tr><th>Hora / 시각</th><th>Empleado / 사원</th><th>Proceso / 공정</th><th>Estado / 상태</th></tr></thead>
      <tbody id="scanList">${scanRows(done)}</tbody></table></div>
    </div>
  </div>`;
  const code=$("#scanCode");
  async function go(){
    const v=code.value.trim(); if(!v) return;
    $("#scanBtn").disabled=true;
    const r=await doScan(v,$("#scanWT").value,$("#scanProc").value);
    toast(r.msg, r.ok?"ok":"err");
    $("#scanBtn").disabled=false; code.value=""; code.focus();
    if(r.ok){ $("#scanList").innerHTML=scanRows(await scanTodayList()); }
  }
  $("#scanBtn").onclick=go;
  code.addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
}
function scanRows(list){
  if(!list.length) return `<tr><td colspan="4" class="empty">Sin registros / 기록 없음</td></tr>`;
  return list.slice(0,25).map(r=>{
    const st=r.att_status, cls=st==="Presente"?"pl-ok":st==="Tardanza"?"pl-tard":"pl-aus";
    const shi=r.shift_type==="Día"?"☀":r.shift_type==="Noche"?"🌙":"·";
    return `<tr><td class="mono">${r.check_in||"—"} ${shi}</td>
      <td style="font-weight:600">${esc(r.name)}${r.unreg?` <span class="chip" style="background:#4c1d95;color:#ddd6fe">미등록</span>`:""}</td>
      <td class="muted">${esc(r.process)}</td>
      <td><span class="pill ${cls}">${bi(st)}</span>${r.work_type!=="Normal"?` <span class="chip" style="background:#7c2d12;color:#fdba74">${bi(r.work_type)}</span>`:""}</td></tr>`;
  }).join("");
}

   ══════════════════════════════════════════════════════════════ */
let tY=new Date().getFullYear(), tM=new Date().getMonth()+1;
const SHIFT_OPTS=["","Día","Noche","Descanso"];
async function renderTurnos(){
  const pref=`${tY}-${String(tM).padStart(2,"0")}`;
  const rows=await sel("team_schedule",`sch_date=like.${pref}*&select=*`);
  const map={}; (rows||[]).forEach(r=>map[`${r.team}|${r.sch_date}`]=r.shift);
  const days=new Date(tY,tM,0).getDate();
  const years=[]; for(let y=new Date().getFullYear()+1;y>=2022;y--)years.push(y);
  const teams=["A","B","C"];
  let body="";
  for(let d=1;d<=days;d++){
    const ds=`${pref}-${String(d).padStart(2,"0")}`;
    const wd=new Date(ds+"T00:00:00").getDay();
    const wknd=wd===0||wd===6;
    body+=`<tr${wknd?' style="background:#ffffff05"':''}>
      <td class="mono" style="font-weight:700">${d} <span class="muted">${["日","月","火","水","木","金","土"][wd]}</span></td>
      ${teams.map(tm=>{
        const cur=map[`${tm}|${ds}`]||"";
        return `<td><select class="fi bsm" style="padding:4px 6px" onchange="saveTurno('${tm}','${ds}',this.value)">
          ${SHIFT_OPTS.map(o=>`<option value="${o}" ${o===cur?"selected":""}>${o?bi(o):"—"}</option>`).join("")}</select></td>`;
      }).join("")}</tr>`;
  }
  $("#view").innerHTML=`
  <div class="ptitle">🔄 Turnos de equipos (A/B/C) / 팀 근무표</div>
  <div class="flex mb12">
    <select id="tY" class="fi" style="max-width:120px" onchange="turnoSet()">${years.map(y=>`<option ${y===tY?"selected":""}>${y}</option>`).join("")}</select>
    <select id="tM" class="fi" style="max-width:120px" onchange="turnoSet()">${Array.from({length:12},(_,i)=>i+1).map(m=>`<option ${m===tM?"selected":""} value="${m}">${m}月</option>`).join("")}</select>
    <span class="muted" style="font-size:12px">교대 근무팀의 날짜별 주/야/휴무 지정</span>
  </div>
  <div class="tw card p0"><table style="min-width:420px"><thead><tr>
    <th>Fecha / 날짜</th><th>Equipo A / A조</th><th>Equipo B / B조</th><th>Equipo C / C조</th></tr></thead>
    <tbody>${body}</tbody></table></div>`;
}
window.turnoSet=()=>{ tY=+$("#tY").value; tM=+$("#tM").value; renderTurnos(); };
window.saveTurno=async(team,ds,shift)=>{
  if(shift==="") { await del("team_schedule",`team=eq.${team}&sch_date=eq.${ds}`); }
  else { await insert("team_schedule",{team,sch_date:ds,shift},true); }
  toast(`${team} · ${ds} → ${shift||"—"}`,"ok");
};

/* 교대조(Turno A/B/C)는 주/야가 근무표에서 결정되므로 등록 화면의 주/야 필드를 비활성화 */
window.toggleShiftField=()=>{
  const tp=$("#eTp"), sh=$("#eSh"), note=$("#eShNote"); if(!tp||!sh)return;
  const isTeam=["Turno A","Turno B","Turno C"].includes(tp.value);
  sh.disabled=isTeam; sh.style.opacity=isTeam?.5:1;
  if(note)note.classList.toggle("hidden",!isTeam);
};
window.saveEmp=async()=>{
  const g=id=>$("#"+id).value.trim();
  const emp_id=g("eId").toUpperCase(), name=g("eNm"), process=g("ePr");
  if(!emp_id||!name||!process){ toast("Código, nombre y proceso obligatorios / 코드·이름·공정 필수","err"); return; }
  const row={emp_id,name,process,rank:g("eRk")||"Operario",emp_type:g("eTp"),shift:g("eSh"),
    std_time:g("eTm")||"06:00",status:g("eSt"),hire_date:g("eHd")};
  const orig=$("#eOrig").value;
  if(!S.ranks.includes(row.rank)) await insert("ranks",{name:row.rank},true).catch(()=>{});
  if(orig && orig!==emp_id) await del("employees",`emp_id=eq.${orig}`);
  await insert("employees",row,true);
  closeModal(); await loadMasters(); toast("Empleado guardado / 사원 저장됨","ok"); router();
};
window.delEmp=async id=>{ if(!confirm("¿Eliminar empleado "+id+"?"))return;

/* ══════════════════════════════════════════════════════════════
   엑셀 — 직원 마스터 양식 다운 / 검증 업로드
   ══════════════════════════════════════════════════════════════ */
const TPL_HDRS=["Cód.(emp_id)","Nombre","Proceso","Cargo","Tipo Turno","Turno(Día/Noche)","H.Estándar","Situación","F.Ingreso"];
function downloadTemplate(){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([
    TPL_HDRS,
    ["EMP999","Ejemplo López","Proceso A","Operario","Turno A","Día","06:00","Activo",today()]
  ]);
  ws["!cols"]=TPL_HDRS.map(()=>({wch:20}));
  XLSX.utils.book_append_sheet(wb,ws,"Empleados");
  const maxRef=Math.max(S.processes.length,S.ranks.length,EMP_TYPES.length,STATUSES.length);
  const ref=[["Procesos:","Cargos:","Tipos:","Situación:"]];
  for(let i=0;i<maxRef;i++) ref.push([S.processes[i]?.name||"",S.ranks[i]||"",EMP_TYPES[i]||"",STATUSES[i]||""]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ref),"Referencia");
  XLSX.writeFile(wb,"Plantilla_Empleados.xlsx");
  toast("Plantilla descargada / 양식 다운로드","ok");
}
async function importEmployees(input){
  const f=input.files[0]; if(!f)return; input.value="";
  const buf=await f.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).slice(1);
  const procNames=S.processes.map(p=>p.name);
  const good=[], errors=[]; let ln=1;
  for(const r of rows){ ln++;
    if(!r[0] && !r[1]) continue;
    const emp_id=String(r[0]||"").trim().toUpperCase();
    const name=String(r[1]||"").trim();
    const process=String(r[2]||"").trim();
    const errs=[];
    if(!emp_id) errs.push("código vacío");
    if(!name) errs.push("nombre vacío");
    if(!process) errs.push("proceso vacío");
    else if(!procNames.includes(process)) errs.push(`proceso "${process}" no existe`);
    const emp_type=String(r[4]||"Turno A").trim();
    if(!EMP_TYPES.includes(emp_type)) errs.push(`tipo "${emp_type}" inválido`);
    const shift=String(r[5]||"Día").trim();
    if(!SHIFTS.includes(shift)) errs.push(`turno "${shift}" inválido`);
    const std=String(r[6]||"06:00").trim();
    if(!/^\d{1,2}:\d{2}$/.test(std)) errs.push(`hora "${std}" inválida`);
    const status=String(r[7]||"Activo").trim();
    if(!STATUSES.includes(status)) errs.push(`situación "${status}" inválida`);
    let hire=r[8]; if(hire instanceof Date) hire=hire.toLocaleDateString("en-CA");
    hire=String(hire||"").trim();
    if(errs.length){ errors.push({ln,emp_id,errs}); continue; }
    good.push({emp_id,name,process,rank:String(r[3]||"Operario").trim()||"Operario",
      emp_type,shift,std_time:std,status,hire_date:hire});
  }
  // 미리보기 & 확인
  openModal(`<div class="modtitle">📥 Importar empleados / 사원 가져오기</div>
    <div class="flex mb12">
      <span class="pill pl-ok">✅ ${good.length} válidos / 유효</span>
      <span class="pill ${errors.length?'pl-aus':'pl-none'}">⚠ ${errors.length} con error / 오류</span>
    </div>
    ${errors.length?`<div class="tw" style="max-height:200px;overflow:auto;margin-bottom:12px"><table><thead><tr><th>Fila / 행</th><th>Cód. / 코드</th><th>Problema / 오류</th></tr></thead><tbody>
      ${errors.map(e=>`<tr><td class="mono">${e.ln}</td><td class="mono">${esc(e.emp_id||"—")}</td><td style="color:var(--err)">${esc(e.errs.join(", "))}</td></tr>`).join("")}
    </tbody></table></div>`:""}
    <div class="flex">
      <button class="btn bok" onclick='confirmImport()' ${good.length?"":"disabled"}>Guardar ${good.length} empleados / ${good.length}명 저장</button>
      <button class="btn bg" onclick="closeModal()">Cancelar / 취소</button>
    </div>`);
  window.__importBatch=good;
}
window.confirmImport=async()=>{
  const good=window.__importBatch||[]; if(!good.length)return;
  // 새 직급 자동 등록
  const newRanks=[...new Set(good.map(g=>g.rank).filter(r=>!S.ranks.includes(r)))];
  for(const r of newRanks) await insert("ranks",{name:r},true).catch(()=>{});
  await insert("employees",good,true);
  closeModal(); await loadMasters(); toast(`✓ ${good.length} empleados importados / ${good.length}명 가져옴`,"ok"); renderAdmin();
};

/* ══════════════════════════════════════════════════════════════

async function exportTodayExcel(){
  const recs=await todayRecords();
  const aoa=[["Cód.","Nombre","Proceso","Cargo","Turno","Entrada","Estado","Tipo","Ausencia"]];
  recs.forEach(r=>{ const a=r.a;
    aoa.push([r.emp_id,r.name,a&&a.work_process||r.process,r.rank,
      a?a.shift_type:"",a?a.check_in||"":"",a?a.att_status:"Ausente",a?a.work_type:"",a?a.abs_type:""]);});
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),"Hoy");
  XLSX.writeFile(wb,`Asistencia_${today()}.xlsx`);
  toast("Excel del día descargado / 당일 엑셀 다운로드","ok");
}
async function exportMonthlyAll(){
  await exportMatrix(activeEmps(),`Asistencia_${histY}-${String(histM).padStart(2,"0")}.xlsx`);
}
window.exportMonthlyOne=async id=>{
  const e=S.employees.find(x=>x.emp_id===id); if(e) await exportMatrix([e],`${id}_${histY}-${String(histM).padStart(2,"0")}.xlsx`);
};
async function exportMatrix(emps,fname){
  const y=histY,m=histM, days=new Date(y,m,0).getDate();
  const pref=`${y}-${String(m).padStart(2,"0")}`;
  const recs=await sel("attendance",`att_date=like.${pref}*&select=*`);
  const byEmp={}; (recs||[]).forEach(r=>{ (byEmp[r.emp_id]=byEmp[r.emp_id]||{})[r.att_date]=r; });
  const head=["Cód.","Nombre","Proceso","Cargo","Tipo",...Array.from({length:days},(_,i)=>i+1),"Pres.","Tard.","Aus.","H.Ex.","Recup."];
  const aoa=[head];
  const todStr=today();
  emps.forEach(e=>{
    const recMap=byEmp[e.emp_id]||{};
    const c={p:0,t:0,a:0,e:0,r:0};
    const row=[e.emp_id,e.name,e.process,e.rank,e.emp_type];
    for(let d=1;d<=days;d++){
      const ds=`${pref}-${String(d).padStart(2,"0")}`;
      const wd=new Date(ds+"T00:00:00").getDay();
      const rec=recMap[ds];
      if(wd===0||wd===6){ row.push("Des"); continue; }
      if(ds>todStr){ row.push(""); continue; }
      if(rec){ const st=rec.att_status, wt=rec.work_type;
        let sym={"Presente":"○","Tardanza":"△","Ausente":"✕"}[st]||"✕";
        if(wt==="H.Extra")sym="★"; if(wt==="Recuperación")sym="◆";
        row.push(sym);
        if(st==="Presente")c.p++; if(st==="Tardanza")c.t++; if(st==="Ausente")c.a++;
        if(wt==="H.Extra")c.e++; if(wt==="Recuperación")c.r++;
      } else { row.push("✕"); c.a++; }
    }
    row.push(c.p,c.t,c.a,c.e,c.r); aoa.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"]=[{wch:9},{wch:16},{wch:11},{wch:12},{wch:12},...Array.from({length:days},()=>({wch:4})),...Array(5).fill({wch:6})];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,pref);
  XLSX.writeFile(wb,fname);
  toast("Excel descargado / 엑셀 다운로드","ok");
}

      Abra el archivo y complete <code>CONFIG.SUPABASE_URL</code> y <code>CONFIG.SUPABASE_ANON_KEY</code>
      con los datos de su proyecto (Supabase → Project Settings → API).</p></div>`;
    return;
  }
  try{ await loadMasters(); }
  catch(e){ $("#view").innerHTML=`<div class="card" style="max-width:640px;margin:40px auto">
      <div class="modtitle">⚠ Error de conexión / 연결 오류</div>
      <p class="muted">No se pudo conectar a Supabase. Verifique la URL/clave y que el esquema (schema.sql) esté ejecutado.<br><br>
      <span class="mono" style="font-size:12px">${esc(e.message)}</span></p></div>`; return; }
  if(!location.hash) location.hash="#/";
  router();
}
boot();
